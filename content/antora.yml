    argocd_url: https://openshift-gitops-server-openshift-gitops.{openshift_cluster_ingress_domain}
    sonarqube_url: https://sonarqube-sonarqube.{openshift_cluster_ingress_domain}
    devspaces_url: https://devspaces.{openshift_cluster_ingress_domain}
    gitlab_url: https://gitlab-gitlab.{openshift_cluster_ingress_domain}